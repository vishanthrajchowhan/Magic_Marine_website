<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - Magic Marine Service">
    <title>404 - Page Not Found | Magic Marine Service</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/jpeg" href="Gallery/Logo.jpg">
    <style>
        .not-found-wrap {
            min-height: 75vh;
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, #f7f9fc 0%, #edf2f8 100%);
            padding: 3rem 1rem;
        }

        .not-found-card {
            max-width: 720px;
            width: 100%;
            text-align: center;
            background: #fff;
            border: 1px solid #e5ecf4;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(10, 31, 51, 0.12);
            padding: 2.5rem;
        }

        .not-found-card h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 0.75rem;
        }

        .not-found-card p {
            margin-bottom: 1.5rem;
        }

        .not-found-actions {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="index.html" class="logo" aria-label="Magic Marine Home"><img src="Gallery/Logo.jpg" alt="Magic Marine logo" width="210" height="46" loading="lazy" decoding="async"></a>
            </div>
        </div>
    </nav>

    <main class="not-found-wrap">
        <section class="not-found-card">
            <h1>404 - Page Not Found</h1>
            <p>The page you requested is unavailable. Continue to the homepage or contact our team for help.</p>
            <div class="not-found-actions">
                <a href="index.html" class="btn btn-primary">Go Home</a>
                <a href="contact.html" class="btn btn-amazon">Contact Us</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Magic Marine Service. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
